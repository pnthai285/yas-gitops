apiVersion: v1
kind: ServiceAccount
metadata:
  name: update-keycloak-client-secrets
---
apiVersion: batch/v1
kind: Job
metadata:
  name: update-keycloak-client-secrets
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: update-keycloak-client-secrets
      containers:
        - name: update-client-secrets
          image: curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_BASE_URL
              value: http://keycloak-service.keycloak.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: Yas
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: password
            - name: BACKOFFICE_BFF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yas-keycloak-credentials-secret
                  key: KEYCLOAK_BACKOFFICE_BFF_CLIENT_SECRET
            - name: STOREFRONT_BFF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yas-keycloak-credentials-secret
                  key: KEYCLOAK_STOREFRONT_BFF_CLIENT_SECRET
            - name: CUSTOMER_MANAGEMENT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yas-keycloak-credentials-secret
                  key: KEYCLOAK_CUSTOMER_MANAGEMENT_CLIENT_SECRET
          command:
            - sh
            - -ec
            - |
              token_response="$(curl -fsS \
                -d "client_id=admin-cli" \
                -d "username=${KEYCLOAK_ADMIN_USERNAME}" \
                -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                -d "grant_type=password" \
                "${KEYCLOAK_BASE_URL}/realms/master/protocol/openid-connect/token")"
              token="$(printf '%s' "$token_response" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')"
              [ -n "$token" ]

              update_secret() {
                client_id="$1"
                client_secret="$2"
                client_uuid="$(curl -fsS \
                  -H "Authorization: Bearer ${token}" \
                  "${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/clients?clientId=${client_id}" \
                  | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')"
                [ -n "$client_uuid" ]
                curl -fsS -X PUT \
                  -H "Authorization: Bearer ${token}" \
                  -H "Content-Type: application/json" \
                  -d "{\"type\":\"secret\",\"value\":\"${client_secret}\"}" \
                  "${KEYCLOAK_BASE_URL}/admin/realms/${KEYCLOAK_REALM}/clients/${client_uuid}/client-secret"
              }

              update_secret "backoffice-bff" "${BACKOFFICE_BFF_CLIENT_SECRET}"
              update_secret "storefront-bff" "${STOREFRONT_BFF_CLIENT_SECRET}"
              update_secret "customer-management" "${CUSTOMER_MANAGEMENT_CLIENT_SECRET}"
