global:
  apiHost: api.yasdevops.dev

backend:
  image:
    repository: ghcr.io/nashtech-garage/yas-{{service}}
    tag: latest

  nameOverride: {{service}}
  fullnameOverride: {{service}}
  databaseName: {{service}}

  ingress:
    enabled: true
    host: "{{ .Values.global.apiHost }}"
    path: /{{service}}
