global:
  domain: yasdevops.dev
  apiHost: api.yasdevops.dev
  apiUrl: https://api.yasdevops.dev

# Default values for swagger-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: swaggerapi/swagger-ui
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v4.16.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

baseUrl: /swagger-ui
urls: "[{ url: '{{ .Values.global.apiUrl }}/product/v3/api-docs', name: 'Product' },
      { url: '{{ .Values.global.apiUrl }}/customer/v3/api-docs', name: 'Customer' },
      { url: '{{ .Values.global.apiUrl }}/cart/v3/api-docs', name: 'Cart'},
      { url: '{{ .Values.global.apiUrl }}/media/v3/api-docs', name: 'Media' },
      { url: '{{ .Values.global.apiUrl }}/rating/v3/api-docs', name: 'Rating' },
      { url: '{{ .Values.global.apiUrl }}/order/v3/api-docs', name: 'Order'},
      { url: '{{ .Values.global.apiUrl }}/payment/v3/api-docs', name: 'Payment'},
      { url: '{{ .Values.global.apiUrl }}/location/v3/api-docs', name: 'Location'},
      { url: '{{ .Values.global.apiUrl }}/inventory/v3/api-docs', name: 'Inventory'},
      { url: '{{ .Values.global.apiUrl }}/tax/v3/api-docs', name: 'Tax' },
      { url: '{{ .Values.global.apiUrl }}/promotion/v3/api-docs', name: 'Promotion'},
      { url: '{{ .Values.global.apiUrl }}/search/v3/api-docs', name: 'Search'}]"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  host: "{{ .Values.global.apiHost }}"
  annotations:
    nginx.ingress.kubernetes.io/app-root: /swagger-ui
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: "{{ .Values.global.apiHost }}"
      paths:
        - path: /swagger-ui
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
