hostname: &hostname grafana.yasdevops.dev
prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
grafana:
  grafana.ini:
    database:
      type: postgres
      host: postgresql.postgres.svc.cluster.local:5432
      name: grafana
      user: yasadminuser
      password: ""
      ssl_mode: require
  adminUser: admin
  adminPassword: ""
  # Passwords must be provided via SealedSecret-backed values or an external secret integration.
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - *hostname
  assertNoLeakedSecrets: false
