opentelemetryCollectorConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    loki:
      protocols:
        http:
          endpoint: 0.0.0.0:3500
      use_incoming_timestamp: true
  processors:
    batch: {}
    attributes:
      actions:
        - action: insert
          key: loki.attribute.labels
          value: namespace,container,pod,level,traceId
        - action: insert
          key: loki.format
          value: raw

  exporters:
    debug:
      verbosity: detailed
    # Thay vì dùng exporter 'loki' lỗi thời, ta cấu hình một exporter 'otlphttp' riêng cho Loki
    otlphttp/loki:
      endpoint: http://loki-gateway/otlp
    otlphttp:
      endpoint: http://tempo:4318

  service:
    pipelines:
      logs:
        receivers: [loki]
        processors: [attributes]
        # Gọi tên đúng exporter mới cấu hình ở trên
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp]