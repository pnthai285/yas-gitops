apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  bootstrapAdmin:
    user:
      secret: {{ .Values.bootstrapAdmin.existingSecret | quote }}
  db:
    vendor: postgres
    usernameSecret:
      name: {{ .Values.postgresql.existingSecret | quote }}
      key: username
    passwordSecret:
      name: {{ .Values.postgresql.existingSecret | quote }}
      key: password
    host: {{ .Values.postgresql.host | quote }}
    database: keycloak
    port: 5432
  http:
    httpEnabled: true
    httpPort: 80
  hostname:
    hostname: {{ printf "%s://%s" .Values.scheme (tpl .Values.hostname .) | quote }}
    backchannelDynamic: false
    strict: false
  proxy:
    headers: xforwarded
  ingress:
    enabled: false
  unsupported:
    podTemplate:
      spec:
        volumes:
          - name: yas-themes
            configMap:
              name: yas-themes-configmap
        containers:
          - name: keycloak
            volumeMounts:
              - name: yas-themes
                mountPath: /opt/keycloak/providers
